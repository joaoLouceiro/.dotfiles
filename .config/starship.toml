"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$line_break$character"""

add_newline = false
palette = "everforest"

[palettes.everforest]
bg_dim = "#232a2e"
bg0 = "#2d353b"
bg1 = "#343f44"
bg2 = "#3d484d"
bg3 = "#475258"
bg4 = "#4f585e"
bg5 = "#56635f"
bg_visual = "#543a48"
bg_red = "#514045"
bg_green = "#425047"
bg_blue = "#3a515d"
bg_yellow = "#4d4c43"

fg = "#d3c6aa"
red = "#e67e80"

orange = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"
grey0 = "#7a8478"
grey1 = "#859289"
grey2 = "#9da9a0"
statusline1 = "#a7c080"
statusline2 = "#d3c6aa"
statusline3 = "#e67e80"

[line_break]
disabled = false

[fill]
symbol = " "

[os]
disabled = false
format = '[$symbol ]($style)'
style = 'fg:grey2'

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_root = 'fg:red'
style_user = 'fg:blue'
format = '[$user]($style)'

[hostname]
ssh_only = false
style = 'fg:blue'
format = '[@$hostname]($style) '

[directory]
style = "fg:orange"
read_only_style = "fg:orange"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
format = "[ŅŚŠ $path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"projects" = "¾░▓ŗ "

[git_branch]
style = "fg:green"
symbol = "Ņ£ź "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
ahead = 'ŌćĪ${count}'
diverged = 'ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}'
behind = 'ŌćŻ${count}'
format = '[(\[$all_status$ahead_behind\])]($style)'

[character]
success_symbol = '[’äģ](bold green)'
error_symbol = '[’äģ](bold red)'

[nodejs]
symbol = "Ņ£ś"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[bun]
symbol = "ŅØ»"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = "Ņś× "
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[cpp]
symbol = "ŅśØ "
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[rust]
symbol = "Ņ×©"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = "Ņś¦"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[php]
symbol = "Ņśł"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[java]
symbol = "Ņē¢"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[kotlin]
symbol = "Ņś┤"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = "Ņś¤"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = "Ņśå"
style = "grey0"
format = '[ $symbol( $version) ]($style)'

[docker_context]
symbol = "’īł"
style = "blue"
format = '[[ $symbol( $context) ](fg:#83a598 blue)]($style)'

[conda]
style = "blue"
format = '[[ $symbol( $environment) ](fg:#83a598 blue)]($style)'

[pixi]
style = "blue"
format = '[[ $symbol( $version)( $environment) ](fg:color_bg1 blue)]($style)'

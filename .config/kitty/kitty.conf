include themes/everforest.conf

# --- Options
font_size 11.0
dynamic_background_opacity yes
background_opacity 0.8
background_blur 50

hide_window_decorations yes
window_border_width 1
draw_minimal_borders yes
window_margin_width 2

tab_powerline_style angled

tab_bar_edge top
tab_bar_margin_width 2.0
tab_bar_margin_height 2.0 2.0
tab_bar_style    powerline
# tab_title_template          "{index}: {fmt.bold}{tab.active_exe}{fmt.nobold} {title.split('/')[-1]}"
tab_bar_align left

cursor_trail 1
cursor_trail_decay 0.1 0.5
cursor_trail_start_threshold 0

enable_audio_bell no
visual_bell_duration 0.3

allow_remote_control yes
listen_on unix:@mykitty

# BEGIN_KITTY_FONTS
font_family      family="Adwaita Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS


# --- Keymaps ---
map ctrl+j kitten plugins/pass_keys.py bottom ctrl+j
map ctrl+k kitten plugins/pass_keys.py top    ctrl+k
map ctrl+h kitten plugins/pass_keys.py left   ctrl+h
map ctrl+l kitten plugins/pass_keys.py right  ctrl+l

map kitty_mod+t new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd

map kitty_mod+x toggle_layout stack
